<!doctype html>
<!-- Interval reference window v0.9 — layer 3.
     Aesthetic brief: early RuneScape / early-internet low-poly. Chunky
     oblique tiles, polygon trees, stone-bevel UI chrome, gold-on-brown
     text, a 4x7 inventory grid. This is ONE window among many possible:
     the protocol has no authoritative aesthetic; every client is a reskin.
     Click ground to walk · click tree/rock/water to gather · click a
     goblin to fight · click fire (with raw fish) to cook · click cooked
     fish in inventory to eat. -->
<html>
<head>
<meta charset="utf-8">
<title>Interval</title>
<style>
  :root {
    --stone: #494034; --stone-dk: #2e2820; --stone-lt: #6b5f4a;
    --gold: #ffcc33; --parch: #d9c9a3; --hp: #c0392b; --hpbg: #4a1008;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: #1c1710; color: var(--gold);
    font: 13px/1.4 Verdana, Geneva, sans-serif;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 16px;
  }
  #frame { display: flex; gap: 0; border: 3px solid var(--stone-dk); flex-wrap: wrap; max-width: 1100px; }
  canvas { display: block; background: #253a17; image-rendering: pixelated; cursor: crosshair;
           width: min(100%, 840px); height: auto; }
  /* the classic stone bevel: light top-left, dark bottom-right */
  .stone {
    background: var(--stone);
    border-top: 2px solid var(--stone-lt); border-left: 2px solid var(--stone-lt);
    border-bottom: 2px solid var(--stone-dk); border-right: 2px solid var(--stone-dk);
  }
  #panel { width: 210px; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
  #panel h2 { font-size: 11px; letter-spacing: 1px; color: var(--parch); text-transform: uppercase; }
  #hpbar { height: 14px; background: var(--hpbg); position: relative; }
  #hpfill { height: 100%; background: var(--hp); width: 100%; transition: width .3s; }
  #hptext { position: absolute; inset: 0; text-align: center; font-size: 10px; color: #fff; line-height: 14px; }
  #skills { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; font-size: 11px; }
  #skills div { padding: 3px 5px; background: var(--stone-dk); }
  #skills b { color: var(--parch); font-weight: normal; float: right; }
  #inv { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
  .slot { aspect-ratio: 1; background: var(--stone-dk); display: flex; align-items: center;
          justify-content: center; font-size: 17px; cursor: pointer; user-select: none; }
  .slot:hover { outline: 1px solid var(--gold); }
  #feed { height: 84px; overflow-y: auto; font-size: 10px; color: var(--parch); padding: 4px 6px; }
  #feed div { margin-bottom: 1px; }
  #status { font-size: 10px; color: #8a7a5c; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="world" width="560" height="320"></canvas>
  <div id="panel" class="stone">
    <h2 id="whoami">connecting…</h2>
    <div id="hpbar"><div id="hpfill"></div><div id="hptext"></div></div>
    <h2>Skills</h2><div id="skills"></div>
    <h2>Inventory</h2><div id="inv"></div>
    <div id="feed" class="stone"></div>
    <div id="status"></div>
  </div>
</div>
<script>
const TILE = 40, W = 14, H = 8
const cv = document.getElementById('world'), cx = cv.getContext('2d')
const ICONS = { 'logs': '🪵', 'ore': '🪨', 'raw-fish': '🐟', 'cooked-fish': '🍖', 'burnt-fish': '💀', 'bones': '🦴' }
const XP_TO_LVL = xp => { // mirror of the constitution's table, display only
  let pts = 0, lvl = 1
  for (let l = 2; l <= 99; l++) { pts += Math.floor((l-1) + 300 * Math.pow(2, (l-1)/7)); if (xp >= Math.floor(pts/4)) lvl = l; else break }
  return lvl
}

let myId = null, myName = '', world = null, intent = null, feedLines = []
let lastFeed = { text: '', at: 0 }
const ws = new WebSocket('ws://' + location.host)
const send = a => ws.readyState === 1 && ws.send(JSON.stringify({ type: 'act', action: a }))
const feed = t => { const now = performance.now()
  if (t === lastFeed.text && now - lastFeed.at < 2000) return // no log spam
  lastFeed = { text: t, at: now }
  feedLines.push(t); if (feedLines.length > 40) feedLines.shift()
  const el = document.getElementById('feed')
  el.innerHTML = feedLines.map(x => '<div>' + x + '</div>').join(''); el.scrollTop = 9e9 }

const blockedAt = (s, x, y) => Object.values(s.nodes).some(n => n.x === x && n.y === y)
function stepToward(s, me, goal) {
  const dx = Math.sign(goal.x - me.x), dy = Math.sign(goal.y - me.y)
  // nodes block: try the diagonal, then each axis — first legal step wins
  for (const [mx, my] of [[dx, dy], [dx, 0], [0, dy]]) {
    if (!mx && !my) continue
    const nx = me.x + mx, ny = me.y + my
    if (nx < 0 || nx >= W || ny < 0 || ny >= H || blockedAt(s, nx, ny)) continue
    facing[myId] = mx !== 0 ? mx : (facing[myId] ?? 1) // optimistic turn
    return send({ do: 'move', dx: mx, dy: my })
  }
}

ws.onmessage = (ev) => {
  const m = JSON.parse(ev.data)
  if (m.type === 'hello') { myId = m.playerId; myName = m.name; feed('The interval begins.') }
  if (m.type === 'state') { onState(m.state, m.worldId) }
}

let prev = null
let curState = null, prevState = null, stateAt = 0, curWorldId = ''
const hitFlash = {}   // pid -> ms timestamp of last damage taken
function onState(s, worldId) {
  world = s
  prevState = curState; curState = s; stateAt = performance.now(); curWorldId = worldId
  if (prevState) for (const pid in s.players) {
    const o = prevState.players[pid]
    if (o && s.players[pid].hp < o.hp) hitFlash[pid] = performance.now()
  }
  const me = s.players[myId]
  if (!me) { send({ do: 'spawn' }) }
  else if (myName && !me.name) { send({ do: 'name', name: myName }) }
  else if (me && intent && !me.action) {
    const goal = intent.kind === 'walk' ? intent
      : (s.nodes[intent.id] ?? s.mobs[intent.id])
    if (!goal) { intent = null }
    else if (intent.kind !== 'walk' && Math.max(Math.abs(me.x - goal.x), Math.abs(me.y - goal.y)) <= 1) {
      // arrived: engage automatically — clicking once was the whole command
      if (intent.kind === 'gather') { send({ do: 'gather', nodeId: intent.id }); feed(intent.msg) }
      else { send({ do: 'attack', mobId: intent.id }); feed('You attack the goblin!') }
      intent = null
    } else {
      stepToward(s, me, goal)
      if (intent?.kind === 'walk' && me.x === goal.x && me.y === goal.y) intent = null
    }
  }
  // event feed from state diffs
  if (prev && me && prev.players[myId]) {
    const old = prev.players[myId]
    for (const k in me.skills) if (me.skills[k] > old.skills[k]) {
      const l1 = XP_TO_LVL(old.skills[k]), l2 = XP_TO_LVL(me.skills[k])
      if (l2 > l1) feed('Level up! ' + k + ' is now ' + l2 + '.')
    }
    if (me.hp < old.hp) feed('You take ' + (old.hp - me.hp) + ' damage.')
    if (me.hp > old.hp) feed('You eat the fish. It heals ' + (me.hp - old.hp) + '.')
    // announce what landed in the inventory this tick
    const GAIN = { 'logs': 'You get some logs.', 'ore': 'You manage to mine some ore.',
                   'raw-fish': 'You catch a fish!', 'cooked-fish': 'Nicely cooked.',
                   'burnt-fish': 'You accidentally burn the fish.', 'bones': 'The goblin drops bones.' }
    const cnt = inv => inv.reduce((m, s) => (s && (m[s.item] = (m[s.item] || 0) + 1), m), {})
    const a = cnt(old.inventory), b = cnt(me.inventory)
    for (const item in b) if ((b[item] || 0) > (a[item] || 0) && GAIN[item]) feed(GAIN[item])
    // your working node just went dark → tell the player why they stopped
    if (old.action?.type === 'gather' && !me.action) {
      const n = s.nodes[old.action.nodeId]
      if (n && n.depletedUntil > s.tick) feed({ 'tree': 'The tree falls.', 'rock': 'The rock crumbles.',
        'fishing-spot': 'The fish stop biting — for now.' }[n.type] ?? 'Exhausted.')
    }
    if (old.hp <= 2 && me.hp > old.hp && me.x === 7 && me.y === 4 && old.x !== 7) feed('Oh dear, you are dead. Your items are gone.')
  }
  prev = s
  panel(s)
}

// ---- low-poly animated renderer ----
const px = (x) => x * TILE, py = (y) => y * TILE
const lerp = (a, b, t) => a + (b - a) * t
function poly(pts, fill, stroke) {
  cx.beginPath(); cx.moveTo(pts[0][0], pts[0][1])
  for (const p of pts.slice(1)) cx.lineTo(p[0], p[1])
  cx.closePath(); cx.fillStyle = fill; cx.fill()
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = 1; cx.stroke() }
}
function tileShade(x, y) {
  const h = (x * 7 + y * 13) % 4
  return ['#3d5a23', '#436327', '#365020', '#40592a'][h]
}

// pre-render the ground once: it never changes
const ground = document.createElement('canvas')
ground.width = cv.width; ground.height = cv.height
{ const g = ground.getContext('2d')
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    g.fillStyle = tileShade(x, y); g.fillRect(px(x), py(y), TILE, TILE)
    g.strokeStyle = 'rgba(0,0,0,.12)'; g.strokeRect(px(x) + .5, py(y) + .5, TILE - 1, TILE - 1)
  } }

const facing = {}  // pid -> -1 left / 1 right

// the little citizen: shadow, legs, tunic, arms, tool, head. ~26px tall.
function drawCitizen(X, Y, o) {
  const now = o.now
  const bob = o.anim === 'idle' ? Math.sin(now / 600) * 0.8 : 0
  const step = o.anim === 'walk' ? Math.sin(now / 110) : 0
  const swing = (o.anim === 'gather' || o.anim === 'fight')
    ? Math.sin(now / (o.anim === 'fight' ? 130 : o.tool === 'rod' ? 700 : 200)) : 0
  const lunge = o.anim === 'fight' ? Math.max(0, Math.sin(now / 130)) * 3 * o.face : 0
  X += lunge; Y += bob
  const F = o.face

  // shadow
  cx.fillStyle = 'rgba(0,0,0,.28)'
  cx.beginPath(); cx.ellipse(X + 20, Y + 35, 8, 2.6, 0, 0, 7); cx.fill()

  const flash = o.hitAt && now - o.hitAt < 220
  const tunic = flash ? '#ffffff' : (o.mine ? '#c9a227' : '#3a6ea5')
  const tunicDk = flash ? '#dddddd' : (o.mine ? '#9a7c1c' : '#2c547e')
  const skin = flash ? '#ffffff' : '#e8c98f'

  // legs (alternate while walking)
  cx.fillStyle = '#4a3a26'
  cx.fillRect(X + 16 + step * 1.5, Y + 28, 3.4, 7 - Math.abs(step))
  cx.fillRect(X + 21 - step * 1.5, Y + 28, 3.4, 7 - Math.abs(step))
  // tunic (trapezoid, slight lean while working)
  const lean = swing * 1.5 * F
  poly([[X+14+lean, Y+16], [X+26+lean, Y+16], [X+27, Y+29], [X+13, Y+29]], tunic, tunicDk)
  cx.fillStyle = tunicDk; cx.fillRect(X + 13, Y + 22, 14, 1.6) // belt
  // rear arm
  cx.fillStyle = skin
  cx.fillRect(X + (F > 0 ? 12 : 25), Y + 17, 3, 8 + swing * 2)
  // tool arm + tool
  const ax = X + (F > 0 ? 25 : 12), ay = Y + 17
  cx.save()
  cx.translate(ax + 1.5, ay + 1)
  cx.rotate(F * (o.anim === 'gather' ? -0.6 + swing * 0.9 : o.anim === 'fight' ? -0.3 + swing * 1.1 : 0.15))
  cx.fillStyle = skin; cx.fillRect(-1.5, 0, 3, 9)
  if (o.anim === 'gather' && o.tool === 'rod') { // fishing rod: long, thin, line down
    cx.rotate(F * -0.5)
    cx.fillStyle = '#5c4023'; cx.fillRect(-0.8, 6, 1.6, 15)
    cx.strokeStyle = 'rgba(230,230,230,.8)'; cx.lineWidth = 0.8
    cx.beginPath(); cx.moveTo(0, 21); cx.lineTo(F * 4, 26 + Math.sin(o.now / 300) * 1.5); cx.stroke()
  } else if (o.anim === 'gather' && o.tool === 'pick') { // pickaxe
    cx.fillStyle = '#5c4023'; cx.fillRect(-1, 8, 2, 10)
    cx.strokeStyle = '#8a8a82'; cx.lineWidth = 3
    cx.beginPath(); cx.arc(0, 17, 5, F > 0 ? -0.6 : 2.5, F > 0 ? 0.6 : 3.7); cx.stroke()
  } else if (o.anim === 'gather') { // hatchet
    cx.fillStyle = '#5c4023'; cx.fillRect(-1, 8, 2, 9)
    cx.fillStyle = '#8a8a82'; cx.fillRect(F > 0 ? 1 : -6, 14, 5, 4)
  } else if (o.anim === 'fight') { // sword
    cx.fillStyle = '#b8b8b0'; cx.fillRect(-1, 8, 2, 12)
    cx.fillStyle = '#5c4023'; cx.fillRect(-3, 8, 6, 2)
  }
  cx.restore()
  // head: skin, hair cap, eye toward facing
  cx.fillStyle = skin; cx.fillRect(X + 15.5, Y + 7, 9, 9)
  cx.fillStyle = o.mine ? '#6b4a1e' : '#2b2b2b'
  cx.fillRect(X + 15, Y + 5.5, 10, 3.4)
  cx.fillRect(X + (F > 0 ? 15 : 23), Y + 7, 2, 5) // sideburn on trailing side
  cx.fillStyle = '#1c1710'
  cx.fillRect(X + (F > 0 ? 21.5 : 17), Y + 10, 1.6, 1.6)

  // name + hp (hp shown when hurt or fighting)
  cx.fillStyle = '#ffcc33'; cx.font = 'bold 10px Verdana'; cx.textAlign = 'center'
  cx.fillText(o.name, X + 20, Y + 2)
  if (o.hp < o.maxHp || o.anim === 'fight') {
    cx.fillStyle = '#4a1008'; cx.fillRect(X + 12, Y + 3, 16, 2.4)
    cx.fillStyle = '#c0392b'; cx.fillRect(X + 12, Y + 3, 16 * (o.hp / o.maxHp), 2.4)
  }
}

function drawScene(now) {
  const s = curState; if (!s) return
  cx.clearRect(0, 0, cv.width, cv.height)
  cx.drawImage(ground, 0, 0)
  const t = Math.min(1, (now - stateAt) / 600)

  for (const [id, n] of Object.entries(s.nodes)) {
    const X = px(n.x), Y = py(n.y), dep = n.depletedUntil > s.tick
    if (n.type === 'tree') {
      poly([[X+18,Y+22],[X+22,Y+22],[X+22,Y+34],[X+18,Y+34]], '#5c4023')
      if (!dep) {
        const sway = Math.sin(now / 900 + n.x) * 1.2
        poly([[X+20+sway,Y+2],[X+34,Y+24],[X+6,Y+24]], '#2f6b1e', '#1e4712')
        poly([[X+20+sway,Y+8],[X+31,Y+26],[X+9,Y+26]], '#3a7d26')
      } else poly([[X+14,Y+20],[X+26,Y+20],[X+22,Y+26],[X+18,Y+26]], '#4a3319')
    }
    if (n.type === 'rock') {
      const c = dep ? '#3a3a3a' : '#7a7a72'
      poly([[X+8,Y+30],[X+14,Y+12],[X+26,Y+9],[X+34,Y+24],[X+28,Y+33]], c, '#2c2c2c')
    }
    if (n.type === 'fishing-spot') {
      cx.fillStyle = dep ? '#2a4a5a' : '#2e6b8a'
      cx.fillRect(X+4, Y+4, TILE-8, TILE-8)
      cx.fillStyle = 'rgba(255,255,255,.5)'
      const d1 = (now / 90) % (TILE - 18), d2 = (now / 130 + 14) % (TILE - 18)
      cx.fillRect(X + 6 + d1, Y + 13, 8, 1.6)
      cx.fillRect(X + 6 + d2, Y + 24, 8, 1.6)
    }
    if (n.type === 'campfire') {
      poly([[X+10,Y+32],[X+30,Y+32],[X+26,Y+28],[X+14,Y+28]], '#4a3319')
      const f1 = Math.sin(now / 90) * 2.4, f2 = Math.sin(now / 70 + 2) * 1.8
      poly([[X+20+f1,Y+8],[X+27,Y+28],[X+13,Y+28]], '#e67e22', '#a04000')
      poly([[X+20+f2,Y+13],[X+24,Y+28],[X+16,Y+28]], '#f4d03f')
      if (Math.floor(now / 300) % 3 === 0) { cx.fillStyle = 'rgba(200,200,200,.35)'; cx.fillRect(X + 19 + f2, Y - 2, 2.4, 2.4) }
    }
  }

  // gold frame on your active target
  const meP = s.players[myId]
  if (meP?.action) {
    const tgt = s.nodes[meP.action.nodeId] ?? s.mobs[meP.action.mobId]
    if (tgt) {
      cx.strokeStyle = 'rgba(255,204,51,' + (0.65 + Math.sin(now / 250) * 0.3) + ')'
      cx.lineWidth = 2; cx.strokeRect(px(tgt.x) + 2, py(tgt.y) + 2, TILE - 4, TILE - 4)
    }
  }

  for (const [id, m] of Object.entries(s.mobs)) {
    if (m.hp <= 0) continue
    const X = px(m.x), Y = py(m.y)
    const engaged = meP?.action?.mobId === id
    const hop = engaged ? Math.abs(Math.sin(now / 160)) * 2 : Math.sin(now / 700 + m.x) * 0.7
    poly([[X+20,Y+10-hop],[X+28,Y+20-hop],[X+24,Y+34],[X+16,Y+34],[X+12,Y+20-hop]], '#4e7d2a', '#2c4a15')
    cx.fillStyle = '#1c1710'
    cx.fillRect(X + 16, Y + 15 - hop, 2, 2); cx.fillRect(X + 22, Y + 15 - hop, 2, 2)
    cx.fillStyle = '#c0392b'; cx.fillRect(X + 13, Y + 4, 14 * (m.hp / 5), 3)
  }

  for (const [pid, p] of Object.entries(s.players)) {
    const o = prevState?.players[pid]
    const ix = o ? lerp(o.x, p.x, t) : p.x
    const iy = o ? lerp(o.y, p.y, t) : p.y
    if (o && p.x !== o.x) facing[pid] = Math.sign(p.x - o.x)
    else if (p.action) {
      const tgt = s.nodes[p.action.nodeId] ?? s.mobs[p.action.mobId]
      if (tgt && tgt.x !== p.x) facing[pid] = Math.sign(tgt.x - p.x)
    }
    const moving = o && (p.x !== o.x || p.y !== o.y) && t < 1
    const anim = moving ? 'walk' : p.action?.type === 'gather' ? 'gather'
               : p.action?.type === 'attack' ? 'fight' : 'idle'
    const workNode = p.action?.nodeId ? s.nodes[p.action.nodeId] : null
    const tool = workNode?.type === 'fishing-spot' ? 'rod'
               : workNode?.type === 'rock' ? 'pick' : 'axe'
    drawCitizen(px(ix), py(iy), {
      now, face: facing[pid] ?? 1, anim, tool, mine: pid === myId,
      name: p.name ?? pid.slice(0, 6), hp: p.hp, maxHp: XP_TO_LVL(p.skills.hitpoints),
      hitAt: hitFlash[pid],
    })
  }

  cx.fillStyle = 'rgba(217,201,163,.75)'; cx.font = '10px Verdana'; cx.textAlign = 'left'
  cx.fillText('world ' + curWorldId + '  ·  tick ' + s.tick, 6, cv.height - 6)
}
requestAnimationFrame(function frame(now) { drawScene(now); requestAnimationFrame(frame) })

function panel(s) {
  const me = s.players[myId]; if (!me) return
  document.getElementById('whoami').textContent = me.name ?? '(unnamed)'
  const maxHp = XP_TO_LVL(me.skills.hitpoints)
  document.getElementById('hpfill').style.width = (100 * me.hp / maxHp) + '%'
  document.getElementById('hptext').textContent = 'HP ' + me.hp + ' / ' + maxHp
  document.getElementById('skills').innerHTML = Object.entries(me.skills)
    .map(([k, xp]) => '<div>' + k.slice(0, 7) + ' <b>' + XP_TO_LVL(xp) + '</b></div>').join('')
  document.getElementById('inv').innerHTML = me.inventory.slice(0, 28)
    .map((it, i) => '<div class="slot" data-i="' + i + '" title="' + (it ? it.item : '') + '">' + (it ? (ICONS[it.item] ?? '?') : '') + '</div>').join('')
  document.getElementById('status').textContent =
    me.action ? 'busy: ' + me.action.type : 'idle — click the world'
}

document.getElementById('inv').addEventListener('click', (e) => {
  const i = e.target.dataset.i; if (i === undefined || !world) return
  const it = world.players[myId]?.inventory[i]
  if (it?.item === 'cooked-fish') { send({ do: 'eat', slot: +i }); feed('You eat the fish.') }
  if (it?.item === 'raw-fish') { send({ do: 'cook', slot: +i }); feed('You attempt to cook…') }
})

cv.addEventListener('click', (e) => {
  if (!world) return
  const r = cv.getBoundingClientRect()
  const sx = (e.clientX - r.left) * (cv.width / r.width)
  const sy = (e.clientY - r.top) * (cv.height / r.height)
  const x = Math.floor(sx / TILE), y = Math.floor(sy / TILE)
  if (x < 0 || x >= W || y < 0 || y >= H) return
  const me = world.players[myId]; if (!me) return
  const adj = (o) => Math.max(Math.abs(me.x - o.x), Math.abs(me.y - o.y)) <= 1

  for (const [id, m] of Object.entries(world.mobs))
    if (m.hp > 0 && m.x === x && m.y === y) {
      if (me.action?.mobId === id) return                      // already fighting it: silent
      if (adj(m)) { send({ do: 'attack', mobId: id }); feed('You attack the goblin!') }
      else intent = { kind: 'attack', id }                     // walk there, then engage
      return
    }

  for (const [id, n] of Object.entries(world.nodes))
    if (n.x === x && n.y === y) {
      if (me.action?.nodeId === id) return                     // already working it: silent
      if (n.type !== 'campfire' && n.depletedUntil > world.tick) {
        feed({ 'tree': 'The tree is felled. It will regrow.',
               'rock': 'The rock is mined out. Give it a moment.',
               'fishing-spot': "The fish aren't biting here yet." }[n.type] ?? 'Nothing left here.')
        return
      }
      if (n.type === 'campfire') {
        if (!adj(n)) { intent = { kind: 'walk', x: n.x, y: n.y - 1 }; return }
        const i = me.inventory.findIndex(s => s && s.item === 'raw-fish')
        if (i !== -1) { send({ do: 'cook', slot: i }); feed('You cook the fish on the fire\u2026') }
        else feed('You have nothing to cook.')
        return
      }
      const msg = { 'tree': 'You swing your axe at the tree.',
                    'rock': 'You take a swing at the rock.',
                    'fishing-spot': 'You cast your line\u2026' }[n.type] ?? 'You begin gathering.'
      if (adj(n)) { send({ do: 'gather', nodeId: id }); feed(msg) }
      else intent = { kind: 'gather', id, msg }                // one click does it all
      return
    }

  if (blockedAt(world, x, y)) return
  intent = { kind: 'walk', x, y }
